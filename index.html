<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgive Me 💕</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(to bottom, #f7b6c2, #fcd3da);
        font-family: Arial, sans-serif;
    }

    .card {
        background: #ffe6ea;
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 300px;
        position: relative;
        z-index: 2;
    }

    .emoji {
        font-size: 60px;
        margin-bottom: 20px;
    }

    h1 {
        color: #e75480;
        font-size: 22px;
        margin-bottom: 20px;
    }

    .buttons {
        display: flex;
        justify-content: center;
        gap: 10px;
    }

    button {
        background: #ff8fa3;
        border: none;
        padding: 10px 20px;
        border-radius: 10px;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        position: relative;
    }

    button:hover {
        background: #ff5c7a;
    }

    #noBtn {
        position: absolute;
    }

    /* Floating hearts */
    .heart {
        position: absolute;
        color: pink;
        font-size: 20px;
        animation: float 6s linear infinite;
    }

    @keyframes float {
        from {
            transform: translateY(100vh) scale(1);
            opacity: 1;
        }
        to {
            transform: translateY(-10vh) scale(1.5);
            opacity: 0;
        }
    }
</style>
</head>
<body>

<div class="card">
    <div class="emoji">😭</div>
    <h1>Will you forgive me?</h1>
    <div class="buttons">
        <button onclick="forgive()">Yes 💕</button>
        <button id="noBtn" onmouseover="moveNo()">No 😢</button>
    </div>
</div>

<script>
function forgive() {
    alert("Yayyy thank you 😭💖 I won't mess up again!");
}

// Move "No" button randomly
function moveNo() {
    const btn = document.getElementById("noBtn");
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

// Create floating hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
