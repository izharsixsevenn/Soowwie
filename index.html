<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I'm Sorry ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Parisienne&family=Poppins:wght@300;400;500&family=Dancing+Script:wght@400;700&family=La+Belle+Aurore&family=Caveat:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Caveat', cursive; /* Main handwritten feel */
    text-align:center;
    overflow-x:hidden;
    min-height:100vh;
    padding-top:40px;
    background: 
        linear-gradient(rgba(0,0,0,0.08), rgba(0,0,0,0.08)),
        url('https://picsum.photos/id/1015/2000/2000') center/cover; /* Scrapbook notebook texture */
    background-attachment: fixed;
    color: #3c2f2f;
}

/* TITLE - Now clearly above envelope */
h1{
    font-family: 'La Belle Aurore', cursive; /* Soft handwritten romantic */
    font-size: clamp(48px, 9vw, 82px);
    color: #9c2a2a;
    margin: 15px 0 25px 0;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.15);
    letter-spacing: 2px;
}

/* HEARTS */
.heart{
    position:fixed;
    top:-30px;
    color:rgba(220, 40, 40, 0.85);
    font-size:24px;
    animation:fall linear infinite;
    z-index:1;
    pointer-events:none;
}
@keyframes fall{
    to{transform:translateY(110vh);}
}

/* ENVELOPE */
.envelope-wrapper{
    margin: 10px auto 40px;
    display:flex;
    justify-content:center;
}

.envelope{
    width:420px;
    max-width:92vw;
    height:290px;
    background:#8b3a3a;
    position:relative;
    cursor:pointer;
    border-radius:22px;
    box-shadow:0 18px 40px rgba(0,0,0,0.55);
}

.flap{
    position:absolute;
    inset:0;
    background:#b14a4a;
    clip-path:polygon(0 0,100% 0,50% 58%);
    transform-origin:top;
    transition:transform 0.95s cubic-bezier(0.6, 0, 0.3, 1);
    z-index:3;
}

.letter{
    position:absolute;
    inset:30px;
    background:#fffef0; /* Warm paper tone */
    border-radius:16px;
    padding:28px 22px;
    font-family:'Dancing Script', cursive; /* Handwritten letter inside */
    font-size:27px;
    color:#5c2a2a;
    line-height:1.55;
    box-shadow:inset 0 0 25px rgba(140,60,60,0.15);
}

/* Open animation */
.envelope.open .flap{
    transform:rotateX(180deg);
}

/* BUTTONS */
button{
    font-family:'Caveat', cursive;
    font-size:17px;
    border:none;
    padding:11px 22px;
    margin:8px 6px;
    border-radius:30px;
    cursor:pointer;
    transition:all 0.3s;
}

.yes{
    background:#d23a3a;
    color:white;
}
.yes:hover{transform:scale(1.1); background:#e04d4d;}

.no{
    background:#e8d5c0;
    color:#5c2a2a;
    position:relative;
}
.no:hover{background:#d9c2a8;}

/* APOLOGY CARD */
.card{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    z-index:99999;
    background:#fffef0;
    padding:45px 35px;
    border-radius:26px;
    box-shadow:0 25px 70px rgba(0,0,0,0.65);
    max-width:620px;
    width:90%;
    text-align:center;
    border:1px solid #d4b8a0;
}

.script{
    font-family:'Great Vibes', cursive; /* Romantic handwritten */
    font-size:34px;
    color:#6b2f2f;
    line-height:1.75;
}

/* FLOWERS & BOWS */
.flower{
    position:fixed;
    bottom:-80px;
    font-size:44px;
    animation:floatUp 4.8s ease-out forwards;
    pointer-events:none;
    z-index:2;
}
@keyframes floatUp{
    0%{opacity:0; transform:translateY(0) scale(0.5);}
    30%{opacity:1;}
    100%{opacity:0; transform:translateY(-135vh) scale(1.35);}
}

.bow{
    position:fixed;
    top:-50px;
    font-size:38px;
    animation:bowFall 6s linear forwards;
    pointer-events:none;
    z-index:2;
}
@keyframes bowFall{
    to{transform:translateY(125vh) rotate(400deg); opacity:0;}
}

#flowerSelector{
    display:none;
    margin:25px auto;
}

/* Music button */
.music-btn{
    font-family:'Caveat', cursive;
    background:rgba(255,255,255,0.25);
    color:#3c2f2f;
    border:2px solid rgba(140,60,60,0.4);
    padding:10px 20px;
    margin-bottom:10px;
    border-radius:30px;
}
</style>
</head>

<body>

<h1>I'm Sorry ❤️</h1>

<button class="music-btn" onclick="toggleMusic()">🎶 Play / Pause Music</button>

<!-- ENVELOPE -->
<div class="envelope-wrapper" id="envWrap">
    <div class="envelope" id="envelope">
        <div class="flap"></div>
        <div class="letter">
            <p>I’m really sorry... 🥺</p>
            <button class="yes" onclick="answerYes()">Forgive Me ❤️</button>
            <button class="no" onmouseover="moveNo(this)">No 😢</button>
        </div>
    </div>
</div>

<!-- Flower selector -->
<div id="flowerSelector">
    <button onclick="startFlowers('❤️')" class="yes">Hearts ❤️</button>
    <button onclick="startFlowers('🌹')" class="yes">Roses 🌹</button>
    <button onclick="startFlowers('💔')" class="yes">Broken Hearts 💔</button>
</div>

<!-- Apology Card -->
<div class="card" id="card">
    <p class="script">
        I’m truly sorry for what I did.<br><br>
        I never meant to hurt you or make you feel unimportant.<br><br>
        You mean everything to me, and I hope you can forgive me.<br><br>
        Please don’t leave me like this ❤️
    </p>
</div>

<audio id="music" loop>
    <source src="love.mp3" type="audio/mpeg">
</audio>

<script>
/* Falling hearts */
for(let i = 0; i < 32; i++){
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";
    h.style.left = Math.random() * 100 + "vw";
    h.style.animationDuration = (3.5 + Math.random() * 7) + "s";
    h.style.animationDelay = Math.random() * -10 + "s";
    document.body.appendChild(h);
}

/* Music */
function toggleMusic(){
    let m = document.getElementById("music");
    if(m.paused){
        m.volume = 0.5;
        m.play();
    } else {
        m.pause();
    }
}

/* Open envelope */
function answerYes(){
    const envelope = document.getElementById("envelope");
    const wrap = document.getElementById("envWrap");

    envelope.classList.add("open");

    const music = document.getElementById("music");
    music.volume = 0.5;
    music.play().catch(()=>{});

    showBows();
    startFlowers('❤️');

    document.getElementById("flowerSelector").style.display = "block";

    setTimeout(() => {
        wrap.style.transition = "all 0.9s ease";
        wrap.style.opacity = "0";
        wrap.style.transform = "scale(0.65) translateY(-40px)";
        
        setTimeout(() => {
            document.getElementById("card").style.display = "block";
        }, 500);
    }, 950);
}

/* Moving No button */
function moveNo(btn){
    const maxX = window.innerWidth - 200;
    const maxY = window.innerHeight * 0.55;
    btn.style.position = "absolute";
    btn.style.left = Math.random() * maxX + "px";
    btn.style.top = Math.random() * maxY + "px";
}

/* Flowers */
let flowerInterval;
function startFlowers(type){
    if(flowerInterval) clearInterval(flowerInterval);

    flowerInterval = setInterval(() => {
        let f = document.createElement("div");
        f.className = "flower";
        f.innerHTML = type;
        f.style.left = Math.random() * 100 + "vw";
        f.style.animationDuration = (4 + Math.random() * 2.5) + "s";
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 6500);
    }, 420);
}

/* Bows */
function showBows(){
    for(let i = 0; i < 13; i++){
        let b = document.createElement("div");
        b.className = "bow";
        b.innerHTML = "🎀";
        b.style.left = Math.random() * 100 + "vw";
        b.style.animationDuration = (5 + Math.random() * 3) + "s";
        document.body.appendChild(b);
        setTimeout(() => b.remove(), 7500);
    }
}

// Click card to close
document.getElementById("card").addEventListener("click", function(){
    this.style.opacity = "0";
    setTimeout(() => this.style.display = "none", 900);
});
</script>

</body>
</html>
