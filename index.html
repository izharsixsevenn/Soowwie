<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgive Me 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to bottom, #f7b6c2, #fcd3da);
    font-family: Arial, sans-serif;
}

/* CARD */
.card {
    background: #ffe6ea;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    z-index: 2;
}

.emoji {
    font-size: 60px;
}

h1 {
    color: #e75480;
}

#message {
    font-size: 14px;
    color: #555;
    min-height: 40px;
    margin: 15px 0;
}

/* YES BUTTON */
#yesBtn {
    background: #ff8fa3;
    border: none;
    padding: 10px 25px;
    border-radius: 10px;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

#yesBtn:hover {
    background: #ff5c7a;
}

/* NO BUTTON (separate layer) */
#noBtn {
    position: fixed;
    top: 70%;
    left: 65%;
    background: #ff8fa3;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    transition: transform 0.2s;
}

/* HEARTS */
.heart {
    position: absolute;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="card" id="card">
    <div class="emoji">😭</div>
    <h1>Will you forgive me?</h1>
    <div id="message"></div>
    <button id="yesBtn" onclick="forgive()">Yes 💕</button>
</div>

<!-- NO BUTTON OUTSIDE -->
<button id="noBtn" onmouseover="moveNo()">No 😢</button>

<!-- MUSIC -->
<audio autoplay loop>
    <source src="https://www.myinstants.com/media/sounds/anime-wow-sound-effect.mp3">
</audio>

<script>
// INTRO TEXT
const intro = "I’m really sorry... I didn’t mean to hurt you 🥺";
let i = 0;

function typeIntro() {
    if (i < intro.length) {
        document.getElementById("message").innerHTML += intro[i];
        i++;
        setTimeout(typeIntro, 40);
    }
}
typeIntro();

// YES CLICK → LETTER
function forgive() {
    const card = document.getElementById("card");

    card.innerHTML = `
        <div style="font-size:50px;">💌</div>
        <h2 style="color:#e75480;">For You...</h2>
        <p id="letter"></p>
    `;

    const text = "I know I hurt you, and I'm really sorry... 🥺 You mean a lot to me. I truly hope we can fix this together 💖";

    let j = 0;
    function typeLetter() {
        if (j < text.length) {
            document.getElementById("letter").innerHTML += text[j];
            j++;
            setTimeout(typeLetter, 40);
        }
    }

    typeLetter();

    // hide NO button after yes
    document.getElementById("noBtn").style.display = "none";
}

// NO BUTTON RUN + SHRINK
let scale = 1;

function moveNo() {
    const btn = document.getElementById("noBtn");

    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    btn.style.left = x + "px";
    btn.style.top = y + "px";

    scale -= 0.1;
    btn.style.transform = scale(${scale});
}

// HEARTS
function heart() {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💖";

    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(h);

    setTimeout(() => h.remove(), 6000);
}

setInterval(heart, 300);
</script>

</body>
</html>
